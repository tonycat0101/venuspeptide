<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Carrito de Compras | Venus Peptide</title>
  <meta name="description" content="Revisa y gestiona los compuestos peptídicos en tu carrito de investigación Venus Peptide.">
  <link rel="stylesheet" href="styles.css">

  <style>
    .cart-section { padding: calc(var(--nav-h) + 60px) 0 100px; background: var(--bg-light); min-height: 75vh; }
    .cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; margin-top: 40px; }
    @media (max-width: 992px) { .cart-layout { grid-template-columns: 1fr; gap: 32px; } }
    .cart-items-list { display: flex; flex-direction: column; gap: 20px; }
    .cart-item { display: flex; align-items: center; gap: 24px; padding: 24px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-white); box-shadow: var(--shadow-card); }
    .item-vial-preview { width: 52px; height: 88px; border: 2px solid var(--border); border-radius: 8px 8px 5px 5px; position: relative; background: var(--bg-white); flex-shrink: 0; }
    .item-vial-cap { width: 100%; height: 12px; border-radius: 5px 5px 0 0; position: absolute; top: -1px; left: 0; }
    .item-vial-text { position: absolute; top: 40%; left: 0; width: 100%; font-size: 8.5px; font-weight: 700; color: var(--text-dark); text-align: center; line-height: 1.1; padding: 0 4px; word-wrap: break-word; }
    .item-details { flex: 1; }
    .item-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .item-pureza { font-size: 13px; color: var(--text-muted); }
    .item-qty-actions { display: flex; align-items: center; gap: 16px; margin-top: 12px; }
    .qty-box { display: flex; align-items: center; border: 1px solid var(--border); border-radius: var(--radius-sm); height: 36px; background: var(--bg-white); overflow: hidden; }
    .qty-btn { background: none; border: none; width: 32px; height: 100%; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text-body); transition: background 0.2s; }
    .qty-btn:hover { background: var(--bg-light); }
    .qty-val { width: 36px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text-dark); border: none; outline: none; }
    .btn-delete { background: none; border: none; color: #ef4444; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-delete:hover { text-decoration: underline; }
    .item-price-total { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--text-dark); text-align: right; min-width: 110px; }
    .cart-summary { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 32px; box-shadow: var(--shadow-card); display: flex; flex-direction: column; gap: 20px; }
    .summary-title { font-family: var(--font-display); font-size: 19px; font-weight: 700; color: var(--text-dark); border-bottom: 1px solid var(--border); padding-bottom: 14px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); }
    .summary-row.total { font-size: 22px; font-weight: 800; color: var(--text-dark); border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; }
    .discount-badge { background: #dcfce7; color: #15803d; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; margin-left: 6px; }
    .empty-cart-box { text-align: center; padding: 80px 24px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-white); box-shadow: var(--shadow-card); display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .error-box { text-align: center; padding: 60px 24px; border: 1px solid #fca5a5; border-radius: var(--radius-md); background: #fef2f2; box-shadow: var(--shadow-card); display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .error-box h2 { color: #dc2626; font-size: 24px; }
    .error-box p { color: #991b1b; max-width: 400px; }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>
  <script src="nav.js"></script>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Inicio</a>
    <a href="categorias.html">Categorías</a>
    <a href="vertodos.html">Ver todos</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="contacto.html">Contacto</a>
    <a href="carrito.html" style="margin-top: 15px; background: #2563eb; color: white !important; text-align: center; padding: 12px; border-radius: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;">
      Ver Carrito
    </a>
  </div>

  <main class="cart-section">
    <div class="container">
      <h1 class="section-title">Tu Carrito</h1>
      <div id="cartWrapper"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const burgerBtn = document.getElementById('burgerBtn');
      const mobileMenu = document.getElementById('mobileMenu');
      if (burgerBtn && mobileMenu) {
        burgerBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('active');
          burgerBtn.classList.toggle('active');
        });
      }
      renderizarCarrito();
    });

    function calcularDescuento(cantidad) {
      if (cantidad >= 10) return 0.15;
      if (cantidad >= 4) return 0.10;
      if (cantidad >= 2) return 0.05;
      return 0;
    }

    function renderizarCarrito() {
      const container = document.getElementById('cartWrapper');

      if (!window.productosData) {
        container.innerHTML = `<div class="error-box"><h2>⚠️ Base de Datos No Disponible</h2><p>No se pudo cargar la información de los productos. Por favor, recarga la página.</p><a href="vertodos.html" class="btn btn-primary">Explorar Péptidos</a></div>`;
        return;
      }

      const cart = JSON.parse(localStorage.getItem('venus_cart')) || [];

      if (typeof actualizarNumeroNavGlobal === 'function') {
        actualizarNumeroNavGlobal();
      } else {
        const totalArticulos = cart.reduce((sum, item) => sum + item.qty, 0);
        const navCount = document.getElementById('navCartCount');
        const navCountMobile = document.getElementById('navCartCountMobile');
        if (navCount) navCount.textContent = `(${totalArticulos})`;
        if (navCountMobile) navCountMobile.textContent = totalArticulos;
      }

      if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart-box"><p style="font-size: 16px; color: var(--text-muted); font-weight: 500;">Tu carrito está vacío actualmente.</p><a href="vertodos.html" class="btn btn-primary">Explorar Péptidos</a></div>`;
        return;
      }

      let itemsHTML = '';
      let subtotal = 0;

      cart.forEach((item) => {
        const prod = window.productosData[item.id];

        if (!prod) {
          itemsHTML += `<div class="cart-item" style="background: #fef2f2; border-color: #fca5a5;"><div style="flex:1;"><div style="font-weight: 600; color: #dc2626;">Producto no disponible</div><div style="font-size:13px; color:#991b1b;">ID: ${item.id}</div></div><button class="btn-delete" onclick="eliminarArticulo('${item.id}')">Eliminar</button></div>`;
          return;
        }

        let precioUnitario = item.tipo === 'kit' ? item.precio : prod.precio;
        let descuentoAplicado = item.tipo === 'kit' ? 0.10 : calcularDescuento(item.qty);
        let precioFinal = item.tipo === 'kit' ? item.precio : prod.precio * (1 - descuentoAplicado);
        const itemTotal = precioFinal * item.qty;
        subtotal += itemTotal;

        const capColor = prod.vialColor === 'pink' ? '#db2777' : '#2563eb';
        let badge = '';
        if (item.tipo === 'kit') badge = '<span class="discount-badge">Kit 10%</span>';
        else if (descuentoAplicado > 0) badge = `<span class="discount-badge">${Math.round(descuentoAplicado * 100)}% off</span>`;

        itemsHTML += `
          <div class="cart-item">
            <div class="item-vial-preview">
              <div class="item-vial-cap" style="background: ${capColor};"></div>
              <div class="item-vial-text">${prod.vialTexto || 'V'}</div>
            </div>
            <div class="item-details">
              <div class="item-name">${prod.nombre} ${badge}</div>
              <div class="item-pureza">${prod.pureza}</div>
              <div class="item-qty-actions">
                <div class="qty-box">
                  <button class="qty-btn" onclick="cambiarCantidad('${item.id}', -1)">−</button>
                  <input type="text" class="qty-val" value="${item.qty}" readonly>
                  <button class="qty-btn" onclick="cambiarCantidad('${item.id}', 1)">+</button>
                </div>
                <button class="btn-delete" onclick="eliminarArticulo('${item.id}')">Eliminar</button>
              </div>
            </div>
            <div class="item-price-total">$${itemTotal.toFixed(2)} USD</div>
          </div>`;
      });

      const envio = subtotal >= 100 ? 0 : 12;
      const total = subtotal + envio;

      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items-list">${itemsHTML}</div>
          <div class="cart-summary">
            <div class="summary-title">Resumen del Pedido</div>
            <div class="summary-row"><span>Subtotal</span><span style="color: var(--text-dark); font-weight: 600;">$${subtotal.toFixed(2)} USD</span></div>
            <div class="summary-row"><span>Envío</span><span style="color: ${envio === 0 ? '#22c55e' : 'var(--text-dark)'}; font-weight: 600;">${envio === 0 ? 'Gratis ✅' : '$' + envio.toFixed(2)}</span></div>
            <div class="summary-row total"><span>Total</span><span>$${total.toFixed(2)} USD</span></div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px; margin-top: 10px; border-radius: var(--radius-sm);" onclick="procesarOrden()">
              Proceder al Pago
            </button>
          </div>
        </div>`;
    }

    window.cambiarCantidad = function(id, cambio) {
      let cart = JSON.parse(localStorage.getItem('venus_cart')) || [];
      const item = cart.find(i => i.id === id);
      if (item) {
        const nuevaCantidad = item.qty + cambio;
        if (nuevaCantidad > 10) { alert(`⚠️ Máximo 10 unidades de este producto.`); return; }
        if (nuevaCantidad <= 0) { cart = cart.filter(i => i.id !== id); }
        else { item.qty = nuevaCantidad; }
        localStorage.setItem('venus_cart', JSON.stringify(cart));
        renderizarCarrito();
      }
    };

    window.eliminarArticulo = function(id) {
      let cart = JSON.parse(localStorage.getItem('venus_cart')) || [];
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem('venus_cart', JSON.stringify(cart));
      renderizarCarrito();
    };

    window.procesarOrden = function() {
      const cart = JSON.parse(localStorage.getItem('venus_cart')) || [];
      if (cart.length === 0) { alert('Tu carrito está vacío. Agrega productos antes de proceder.'); return; }
      window.location.href = 'checkout.html';
    };
  </script>
</body>
</html>
